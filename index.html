<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sabeen Ahmad's Portfolio</title>
  <link rel="icon" type="image/png" href="files/icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    .page {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 4rem;
      gap: 2rem;
      width: 100%;
      height: 100vh;
    }

    .left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 1rem;
      flex-shrink: 0;
    }

    .big-type {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 12rem);
      line-height: 0.9;
      color: #fff;
      user-select: none;
    }
    .big-type span { display: block; }

    .side-text {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      white-space: nowrap;
    }

    .card {
      flex-shrink: 0;
      width: clamp(200px, 30vw, 400px);
      height: clamp(300px, 60vh, 600px);
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      transition: filter 0.3s ease;
    }
    .card img:hover {
      filter: grayscale(0%);
    }

    .countdown {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      font-family: 'Montserrat', sans-serif;
    }

    /* ===== Mobile ===== */
    @media (max-width: 900px) {
      .page { flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; gap: 1.5rem; }
      .left { align-items: center; }
      .side-text { display: none; }
      .big-type { font-size: clamp(3rem, 10vw, 8rem); text-align: center; }
      .card { width: 80vw; height: 50vh; }
    }

    @media (max-width: 500px) {
      .big-type { font-size: clamp(2rem, 12vw, 5rem); }
      .card { width: 90vw; height: 45vh; }
    }
  </style>
</head>
<body>

<div class="page">

  <div class="left">
    <div class="big-type">
      <span>PORT</span>
      <span>FOLIO.</span>
    </div>
    <div class="side-text">More of God — Less of Me</div>
  </div>

  <div class="card">
    <img src="files/sabeen.png" alt="Sabeen Ahmad Photo" />
  </div>

</div>

<div class="countdown" id="countdown">Redirecting in 5s</div>

<script>
  const PORTFOLIO_URL = 'landing.html';

  let s = 5;
  const el = document.getElementById('countdown');
  const iv = setInterval(() => {
    s--;
    if (s <= 0) {
      clearInterval(iv);
      window.location.href = PORTFOLIO_URL;
    } else {
      el.textContent = `Redirecting in ${s}s`;
    }
  }, 1000);
</script>

</body>
</html>
